<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚚 DHL Tracking System</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial;
  background:linear-gradient(135deg,#ff6b6b,#feca57,#ff9ff3);
  min-height:100vh;
  padding:20px;
}

.container{
  max-width:800px;
  margin:auto;
  background:#fff;
  padding:30px;
  border-radius:20px;
}

.header{
  text-align:center;
  margin-bottom:20px;
}

#searchInput{
  width:100%;
  padding:15px;
  font-size:18px;
  text-transform:uppercase;
}

.search-btn{
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#ff6b6b;
  border:none;
  color:#fff;
  font-size:16px;
  cursor:pointer;
  border-radius:8px;
}

.result{
  display:none;
  margin-top:20px;
}

/* DHL CARD */
.card{
  background:#fff;
  padding:20px;
  border-radius:15px;
  box-shadow:0 10px 20px rgba(0,0,0,0.1);
  color:#111;
}

.badge{
  display:inline-block;
  background:#ffcc00;
  padding:6px 15px;
  border-radius:50px;
  font-weight:bold;
  margin:10px 0;
}

.track{
  height:10px;
  background:#eee;
  border-radius:20px;
  overflow:hidden;
  margin:15px 0;
}

.bar{
  height:100%;
  background:#28a745;
  width:70%;
}

.truck{
  font-size:40px;
  animation:move 2s infinite;
}

@keyframes move{
  0%{transform:translateX(-10px);}
  50%{transform:translateX(10px);}
  100%{transform:translateX(-10px);}
}

/* ADMIN */
.admin-btn{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:#111;
  color:#ffcc00;
  font-size:25px;
  border:none;
  cursor:pointer;
}

.admin{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
}

.admin-box{
  background:#fff;
  padding:20px;
  border-radius:10px;
  width:90%;
  max-width:400px;
}

input{
  width:100%;
  padding:10px;
  margin:6px 0;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <h2>🚚 DHL Tracking System</h2>
</div>

<input id="searchInput" placeholder="DHL-XXXXXX">
<button class="search-btn" onclick="searchTracking()">🔍 Track</button>

<div id="searchResult" class="result"></div>

</div>

<!-- ADMIN BUTTON -->
<button class="admin-btn" onclick="openAdmin()">🔐</button>

<!-- ADMIN PANEL -->
<div class="admin" id="adminPanel">

<div class="admin-box">

<h3>Admin Panel</h3>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="address" placeholder="Address">
<input id="gmail" placeholder="Gmail">
<input id="price" placeholder="Price €">
<input id="image" placeholder="Image URL">

<button onclick="addShipment()">Add Shipment</button>

</div>

</div>

<script>

const PASS="200911";
let shipments=JSON.parse(localStorage.getItem("dhlShipments"))||[];

/* 🔐 ADMIN */
function openAdmin(){
  const p=prompt("Password");
  if(p===PASS){
    document.getElementById("adminPanel").style.display="flex";
  }else alert("Wrong password");
}

/* ➕ ADD */
function addShipment(){

  const code="DHL-"+Math.floor(Math.random()*900000+100000);

  shipments.unshift({
    code,
    name:document.getElementById("name").value,
    phone:document.getElementById("phone").value,
    address:document.getElementById("address").value,
    gmail:document.getElementById("gmail").value,
    price:document.getElementById("price").value,
    image:document.getElementById("image").value,
    createdAt:Date.now()
  });

  localStorage.setItem("dhlShipments",JSON.stringify(shipments));

  alert("Added: "+code);
}

/* 🔍 SEARCH */
function searchTracking(){

  const code=document.getElementById("searchInput").value.toUpperCase();
  const result=document.getElementById("searchResult");

  const s=shipments.find(x=>x.code===code);

  if(!s){
    result.style.display="block";
    result.innerHTML="❌ Not Found";
    return;
  }

  result.style.display="block";

  result.innerHTML=`
  <div class="card">

    <h2>📦 DHL Tracking</h2>

    <div class="badge">RICEVUTO</div>

    <p><b>Code:</b> ${s.code}</p>

    <hr>

    <p>📍 From: Sharm El Sheikh 🇪🇬</p>
    <p>📍 To: Italia 🇮🇹</p>

    <div class="track">
      <div class="bar"></div
