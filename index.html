<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DHL Tracking System</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial;
  background:linear-gradient(135deg,#ff6b6b,#feca57,#ff9ff3);
  min-height:100vh;
  padding:20px;
}

.container{
  max-width:800px;
  margin:auto;
  background:#fff;
  padding:30px;
  border-radius:20px;
}

.header{
  text-align:center;
  margin-bottom:20px;
}

input,button{
  width:100%;
  padding:12px;
  margin:6px 0;
  font-size:16px;
}

/* RESULT */
.result{
  display:none;
  margin-top:20px;
  padding:20px;
  border-radius:15px;
  background:#fff;
  box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

/* DHL BUTTON */
.dhl-btn{
  position:fixed;
  bottom:20px;
  right:20px;
  width:70px;
  height:70px;
  border-radius:50%;
  background:#ffcc00;
  border:none;
  font-size:24px;
  cursor:pointer;
}

/* ADMIN */
.admin{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
}

.admin-box{
  background:#fff;
  padding:20px;
  border-radius:10px;
  width:90%;
  max-width:400px;
}

.badge{
  display:inline-block;
  background:#ffcc00;
  padding:6px 15px;
  border-radius:50px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h2>🚚 DHL Tracking System</h2>

<input id="searchInput" placeholder="DHL-XXXXXX">
<button onclick="searchTracking()">Search</button>

<div id="result" class="result"></div>

</div>

<!-- DHL BUTTON -->
<button class="dhl-btn" onclick="dhlClick()">DHL</button>

<!-- ADMIN -->
<div class="admin" id="admin">

<div class="admin-box">

<h3>🔐 Admin Panel</h3>

<input id="fullname" placeholder="Nome e Cognome">
<input id="phone" placeholder="Numero telefono">
<input id="address" placeholder="Indirizzo">
<input id="gmail" placeholder="Gmail">
<input id="price" placeholder="Prezzo €">

<input id="image" type="file" accept="image/*">

<button onclick="addShipment()">Aggiungi Spedizione</button>

</div>

</div>

<script>

let shipments=JSON.parse(localStorage.getItem("dhlShipments"))||[];

let clicks=0;
const PASSWORD="200915";

/* 🔐 OPEN ADMIN */
function dhlClick(){
  clicks++;
  if(clicks<10) return;

  clicks=0;

  const p=prompt("Password:");
  if(p===PASSWORD){
    document.getElementById("admin").style.display="flex";
  }else{
    alert("Wrong password");
  }
}

/* ➕ ADD SHIPMENT */
function addShipment(){

  const file=document.getElementById("image").files[0];

  if(!file){
    alert("📸 Select image");
    return;
  }

  const reader=new FileReader();

  reader.onload=function(e){

    const code="DHL-"+Math.floor(Math.random()*900000+100000);

    shipments.unshift({
      code,
      fullname:document.getElementById("fullname").value,
      phone:document.getElementById("phone").value,
      address:document.getElementById("address").value,
      gmail:document.getElementById("gmail").value,
      price:document.getElementById("price").value,
      image:e.target.result,
      createdAt:Date.now()
    });

    localStorage.setItem("dhlShipments",JSON.stringify(shipments));

    alert("✅ Added: "+code);
  };

  reader.readAsDataURL(file);
}

/* 🔍 SEARCH */
function searchTracking(){

  const code=document.getElementById("searchInput").value.toUpperCase();
  const result=document.getElementById("result");

  const s=shipments.find(x=>x.code===code);

  if(!s){
    result.style.display="block";
    result.innerHTML="❌ Not Found";
    return;
  }

  result.style.display="block";

  result.innerHTML=`
  
  <h2>📦 DHL Tracking</h2>

  <div class="badge">RICEVUTO</div>

  <p><b>Code:</b> ${s.code}</p>

  <hr>

  <p>👤 ${s.fullname}</p>
  <p>📞 ${s.phone}</p>
  <p>📍 ${s.address}</p>
  <p>📧 ${s.gmail}</p>
  <p>💰 ${s.price} €</p>

  <img src="${s.image}" style="max-width:200px;border-radius:10px;margin-top:10px;">

  `;
}

</script>

</body>
</html>
