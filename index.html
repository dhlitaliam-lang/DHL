<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚚 DHL Tracking System</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#ff6b6b,#feca57,#ff9ff3);
  min-height: 100vh;
  padding: 20px;
}

.container {
  max-width: 800px;
  margin: auto;
  background: rgba(255,255,255,0.95);
  padding: 40px;
  border-radius: 25px;
}

.header {
  text-align: center;
  margin-bottom: 30px;
}

.header h1 {
  font-size: 3em;
}

.search-box {
  position: relative;
  margin-bottom: 20px;
}

#searchInput {
  width: 100%;
  padding: 20px;
  font-size: 20px;
  text-transform: uppercase;
}

.search-btn {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  padding: 10px 15px;
  border: none;
  background: #ff6b6b;
  color: #fff;
  cursor: pointer;
  border-radius: 50px;
}

.result {
  display: none;
  margin-top: 20px;
  background: linear-gradient(135deg,#00b894,#00cec9);
  color: #fff;
  padding: 30px;
  border-radius: 20px;
  text-align: center;
}

.tracking-code{
  font-size:26px;
  font-weight:bold;
  margin:10px 0;
}

.status-box{
  margin-top:15px;
  padding:20px;
  background:rgba(0,0,0,0.2);
  border-radius:15px;
}

.truck{
  font-size:40px;
  animation:move 2s infinite;
  display:inline-block;
}

@keyframes move{
  0%{transform:translateX(-10px);}
  50%{transform:translateX(10px);}
  100%{transform:translateX(-10px);}
}

/* ADMIN */
.admin-overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
}

.admin-panel{
  background:#222;
  color:#ffcc00;
  padding:30px;
  border-radius:20px;
  width:90%;
  max-width:400px;
}

.admin-panel input{
  width:100%;
  padding:10px;
  margin:6px 0;
  border:none;
  border-radius:10px;
}

/* DHL BUTTON */
.dhl-logo{
  position:fixed;
  bottom:25px;
  right:25px;
  background:#ffcc00;
  color:#111;
  font-weight:bold;
  font-size:20px;
  padding:12px 18px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.3);
  cursor:pointer;
  user-select:none;
}
</style>
</head>

<body>

<div class="container">
  <div class="header">
    <h1>🚚 DHL Tracking</h1>
  </div>

  <div class="search-box">
    <input id="searchInput" placeholder="DHL-XXXXXX">
    <button class="search-btn" onclick="searchTracking()">🔍</button>
  </div>

  <div id="searchResult" class="result"></div>
</div>

<!-- DHL BUTTON -->
<div class="dhl-logo" onclick="dhlClick()">DHL</div>

<!-- ADMIN PANEL -->
<div class="admin-overlay" id="adminOverlay">
  <div class="admin-panel">
    <h2>لوحة التحكم</h2>

    <input id="name" placeholder="Name">
    <input id="phone" placeholder="Phone">
    <input id="address" placeholder="Address">
    <input id="gmail" placeholder="Gmail">
    <input id="price" placeholder="Price €">
    <input id="image" type="file" accept="image/*">

    <button onclick="addShipment()">➕ إضافة</button>
  </div>
</div>

<script>
const ADMIN_PASSWORD = "200911";
let shipments = JSON.parse(localStorage.getItem("dhlShipments")) || [];

let clickCount = 0;

function dhlClick(){
  clickCount++;

  if(clickCount >= 10){
    const p = prompt("Enter Password:");
    
    if(p === ADMIN_PASSWORD){
      document.getElementById("adminOverlay").style.display = "flex";
    }else{
      alert("Wrong password");
    }

    clickCount = 0;
  }
}

function addShipment(){

  const name=document.getElementById("name").value;
  const phone=document.getElementById("phone").value;
  const address=document.getElementById("address").value;
  const gmail=document.getElementById("gmail").value;
  const price=document.getElementById("price").value;

  const file=document.getElementById("image").files[0];

  if(!file){
    alert("اختر صورة أولاً");
    return;
  }

  const reader=new FileReader();

  reader.onload=function(e){

    const image=e.target.result;

    // ✅ كود التتبع يبدأ بـ DHL
    const code="DHL-"+Math.floor(Math.random()*900000+100000);

    shipments.unshift({
      code,
      name,
      phone,
      address,
      gmail,
      price,
      image,
      status:"RICEVUTO"
    });

    localStorage.setItem("dhlShipments",JSON.stringify(shipments));

    alert("✅ تم إضافة الشحنة بنجاح\n📦 Tracking Code: " + code);

    navigator.clipboard.writeText(code);
  };

  reader.readAsDataURL(file);
}

function searchTracking(){
  const input=document.getElementById("searchInput").value.toUpperCase();
  const result=document.getElementById("searchResult");

  const s=shipments.find(x=>x.code===input);

  if(!s){
    result.innerHTML="❌ Not Found";
  }else{
    result.innerHTML=`
      <h2>📦 RICEVUTO</h2>
      <div class="tracking-code">${s.code}</div>

      <div class="status-box">
        <div class="truck">🚚</div>
        <p>الشحنة في الطريق - 6 أيام</p>
      </div>

      <p>👤 ${s.name}</p>
      <p>📞 ${s.phone}</p>
      <p>📍 ${s.address}</p>
      <p>📧 ${s.gmail}</p>
      <p>💰 ${s.price} €</p>

      <img src="${s.image}" style="max-width:250px;border-radius:15px;margin-top:10px;">
    `;
  }

  result.style.display="block";
}
</script>

</body>
  </html>
